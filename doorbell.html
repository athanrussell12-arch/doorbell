<!DOCTYPE html>
<html>
<head>
<title>Smart Doorbell</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.5/dist/mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --green:#22c55e;
  --amber:#f59e0b;
  --red:#ef4444;
  --cyan:#06b6d4;
}
*{box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%);
  color:var(--text);
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.container{
  width:100%;
  max-width:420px;
  background:var(--card);
  border-radius:24px;
  padding:32px 24px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
}
.header{text-align:center;margin-bottom:24px}
.icon{font-size:48px;margin-bottom:8px}
h1{margin:0;font-size:28px;font-weight:700}
.subtitle{color:var(--muted);margin:8px 0 16px 0;font-size:15px}
.status{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  font-weight:600;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(34,197,94,0.15);
  color:var(--green);
  border:1px solid rgba(34,197,94,0.3);
}
.status.offline{
  background:rgba(239,68,68,0.15);
  color:var(--red);
  border:1px solid rgba(239,68,68,0.3);
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:currentColor;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.button-grid{margin:24px 0;display:grid;gap:14px}
button{
  width:100%;
  padding:20px;
  font-size:18px;
  font-weight:600;
  font-family:'Outfit',sans-serif;
  border:none;
  border-radius:16px;
  cursor:pointer;
  transition:all .15s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  color:#fff;
}
button:active{transform:scale(.97)}
button:disabled{
  opacity:.4;
  cursor:not-allowed;
  transform:none;
}
.normal{background:linear-gradient(135deg, #16a34a, #22c55e)}
.delivery{background:linear-gradient(135deg, #d97706, #f59e0b);color:#1e293b}
.emergency{background:linear-gradient(135deg, #dc2626, #ef4444)}
.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:var(--muted);
}
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--cyan);
  color:#0f172a;
  padding:12px 20px;
  border-radius:12px;
  font-weight:600;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🔔</div>
    <h1>Smart Doorbell</h1>
    <p class="subtitle">Tap a button below to notify the homeowner</p>
    <div id="status" class="status offline">
      <span class="status-dot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </div>
  
  <div class="button-grid">
    <button class="normal" onclick="ring('normal')" disabled>
      <span>👋</span> Normal Visitor
    </button>
    <button class="delivery" onclick="ring('delivery')" disabled>
      <span>📦</span> Package Delivery
    </button>
    <button class="emergency" onclick="ring('emergency')" disabled>
      <span>🚨</span> Emergency
    </button>
  </div>

  <div class="footer">Please close this page when done</div>
</div>

<div id="toast" class="toast">Ring sent!</div>

<script>
const broker = 'wss://broker.hivemq.com:8884/mqtt';
const topic = 'home/doorbell/ring';
const clientId = 'web_doorbell_' + Math.random().toString(16).substr(2, 8);
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const buttons = document.querySelectorAll('button');
const toast = document.getElementById('toast');

const client = mqtt.connect(broker, {
    clientId: clientId,
    clean: true,
    connectTimeout: 4000,
});

client.on('connect', () => {
    statusEl.classList.remove('offline');
    statusText.textContent = 'Online - Ready to ring';
    buttons.forEach(btn => btn.disabled = false);
});

client.on('error', () => {
    statusEl.classList.add('offline');
    statusText.textContent = 'Offline - Refresh page';
    buttons.forEach(btn => btn.disabled = true);
});

client.on('offline', () => {
    statusEl.classList.add('offline');
    statusText.textContent = 'Offline - Check internet';
    buttons.forEach(btn => btn.disabled = true);
});

function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

function ring(mode) {
    if (client.connected) {
        client.publish(topic, mode);
        showToast();
        navigator.vibrate && navigator.vibrate(50);
    } else {
        alert('Not connected. Refresh page.');
    }
}
</script>
</body>
</html>
